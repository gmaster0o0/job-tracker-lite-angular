<hlm-dialog-footer>
  <button hlmBtn variant="outline" type="button" hlmDialogClose>
    <ng-icon hlm name="lucideUndo2" size="sm" />Cancel
  </button>

  <app-save-button
    [formId]="formId()"
    [disabled]="disableSubmit()"
    [isSubmitting]="isSubmitting()"
    idleLabel="Create"
    submittingLabel="Saving..."
  />
</hlm-dialog-footer>
