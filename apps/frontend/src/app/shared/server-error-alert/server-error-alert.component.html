@if (errorMessage()) {
  <hlm-alert variant="destructive" [class]="cssClass()">
    <ng-icon name="lucideAlertCircle" />
    <h4 hlmAlertTitle>
      {{ translationPrefix() + '.error.title' | transloco }}
    </h4>
    <p hlmAlertDescription>
      {{ translationPrefix() + '.error.' + errorMessage() | transloco }}
    </p>
  </hlm-alert>
}
