<hlm-input-group
  class="w-full flex h-10 items-center transition-all duration-200"
  [class.bg-secondary]="isEditing()"
  [class.border-input]="isEditing()"
  [class.shadow-sm]="isEditing()"
  [class.bg-transparent]="!isEditing()"
  [class.border-transparent]="!isEditing()"
  [class.shadow-none]="!isEditing()"
  [class.pointer-events-none]="!isEditing()"
>
  @if (icon()) {
    <hlm-input-group-addon
      align="inline-start"
      class="pl-3 pr-1 text-muted-foreground shrink-0"
    >
      <ng-icon [name]="icon()" class="h-4 w-4" />
    </hlm-input-group-addon>
  }

  <input
    hlmInputGroupInput
    [ngModel]="displayValue()"
    (ngModelChange)="onInputChange($event)"
    [placeholder]="placeholder()"
    class="flex-1 text-sm bg-transparent focus-visible:outline-none h-full"
    [class.pointer-events-none]="!isEditing()"
  />
</hlm-input-group>
