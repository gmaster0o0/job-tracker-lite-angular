<button
  hlmBtn
  type="submit"
  [attr.form]="formId()"
  [disabled]="disabled() || isSubmitting()"
>
  @if (isSubmitting()) {
    <ng-icon hlm name="lucideLoader2" size="sm" class="animate-spin" />
    {{ submittingLabel() }}
  } @else {
    <ng-icon hlm name="lucideSave" size="sm" />
    {{ idleLabel() }}
  }
</button>
