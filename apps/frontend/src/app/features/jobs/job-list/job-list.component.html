@if (jobs.value(); as jobsData) {
  @if (jobsData.length > 0) {
    <section class="grid gap-6 xl:grid-cols-2">
      @for (job of jobsData; track job.id) {
        <app-job-card [job]="job" variant="default" />
      }
    </section>
  } @else {
    <section
      class="rounded-3xl bg-white/90 p-8 text-center shadow-xl shadow-slate-200/80 ring-1 ring-slate-200"
    >
      <h2 class="text-xl font-semibold text-slate-950">No jobs yet</h2>
      <p class="mt-3 text-slate-600">
        Run the seed command to populate the first 10 saved jobs.
      </p>
    </section>
  }
} @else {
  <section
    class="rounded-3xl bg-white/90 p-8 text-center shadow-xl shadow-slate-200/80 ring-1 ring-slate-200"
  >
    <h2 class="text-xl font-semibold text-slate-950">Loading jobs…</h2>
  </section>
}
