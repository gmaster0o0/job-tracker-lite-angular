<div class="space-y-6">
  <div class="space-y-3">
    <div class="flex items-center justify-between gap-4">
      <h2 class="text-3xl font-semibold text-slate-900">Contacts</h2>
      <button
        hlmBtn
        variant="outline"
        type="button"
        (click)="openCreateDialog()"
      >
        <ng-icon hlm size="sm" name="lucidePlus" class="mr-2" />
        Add Contact
      </button>
    </div>
  </div>
  <div
    class="mt-4 overflow-y-auto pr-2 custom-scrollbar"
    style="max-height: calc(100vh - 420px); min-height: 300px"
  >
    <app-contact-list
      [jobId]="jobId()"
      (edit)="openEditDialog($event)"
      (remove)="openDeleteDialog($event)"
    />
  </div>
</div>
