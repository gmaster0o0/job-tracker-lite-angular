<div class="flex flex-wrap gap-2 border-b border-slate-200 pb-2">
  @for (tab of tabs(); track tab.value) {
    <button
      hlmBtn
      size="sm"
      [variant]="activeTab() === tab.value ? 'default' : 'ghost'"
      (click)="onSelect(tab.value)"
      [disabled]="disabled()"
      type="button"
    >
      {{ tab.label }}
    </button>
  }
</div>
