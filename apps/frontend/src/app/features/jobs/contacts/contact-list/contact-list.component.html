<div class="space-y-4">
  @if (contactsResource.isLoading()) {
    <div
      class="rounded-xl border border-slate-200 border-dashed p-12 text-center text-sm text-muted-foreground"
    >
      {{ 'contacts.list.loading' | transloco }}
    </div>
  } @else if ((contactsResource.value()?.length ?? 0) === 0) {
    <div
      class="space-y-4 rounded-xl border border-slate-200 border-dashed p-12 text-center text-lg text-slate-500"
    >
      <p>{{ 'contacts.list.empty' | transloco }}</p>
    </div>
  } @else {
    <div class="grid grid-cols-1 gap-6 p-4 pb-24 lg:grid-cols-2 xl:grid-cols-3">
      @for (contact of contactsResource.value() ?? []; track contact.id) {
        <app-contact-list-item
          [contact]="contact"
          (edit)="onEdit($event)"
          (remove)="onRemove($event)"
        />
      }
    </div>
  }
</div>
