<div class="space-y-4">
  <header class="space-y-1">
    <h2 class="text-lg font-semibold text-slate-900">
      {{ 'contacts.edit.title' | transloco }}
    </h2>
    <p class="text-sm text-muted-foreground">
      {{ 'contacts.edit.description' | transloco }}
    </p>
  </header>

  <form class="space-y-4" [formGroup]="form" (ngSubmit)="submit()">
    <div class="space-y-1">
      <label
        class="text-sm font-medium text-slate-700"
        for="edit-contact-name"
        >{{ 'contacts.fields.name' | transloco }}</label
      >
      <input id="edit-contact-name" hlmInput formControlName="name" />
    </div>

    <div class="space-y-1">
      <label
        class="text-sm font-medium text-slate-700"
        for="edit-contact-email"
        >{{ 'contacts.fields.email' | transloco }}</label
      >
      <input
        id="edit-contact-email"
        hlmInput
        type="email"
        formControlName="email"
      />
    </div>

    <div class="space-y-1">
      <label
        class="text-sm font-medium text-slate-700"
        for="edit-contact-phone"
        >{{ 'contacts.fields.phone' | transloco }}</label
      >
      <input id="edit-contact-phone" hlmInput formControlName="phoneNumber" />
    </div>

    @if (submitError()) {
      <p class="text-sm text-red-600">{{ submitError() }}</p>
    }

    <div class="flex justify-end gap-2 pt-2">
      <button
        hlmBtn
        variant="outline"
        type="button"
        [disabled]="isSubmitting()"
        (click)="cancel()"
      >
        {{ 'common.cancel' | transloco }}
      </button>
      <button hlmBtn type="submit" [disabled]="isSubmitting() || form.invalid">
        {{
          isSubmitting()
            ? ('common.saving' | transloco)
            : ('common.saveChanges' | transloco)
        }}
      </button>
    </div>
  </form>
</div>
