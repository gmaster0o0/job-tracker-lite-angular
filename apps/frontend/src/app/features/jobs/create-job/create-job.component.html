<div class="space-y-4">
  <header class="space-y-1">
    <h2 class="text-lg font-semibold text-slate-900">Add New Job</h2>
    <p class="text-sm text-muted-foreground">
      Fill in the details below to add a new job application.
    </p>
  </header>

  <form class="space-y-4" [formGroup]="form" (ngSubmit)="submit()">
    <div class="grid gap-4 sm:grid-cols-2">
      <div class="space-y-1">
        <label class="text-sm font-medium text-slate-700" for="job-title">
          Job Title
        </label>
        <input id="job-title" hlmInput formControlName="jobTitle" />
      </div>

      <div class="space-y-1">
        <label class="text-sm font-medium text-slate-700" for="position">
          Position
        </label>
        <input id="position" hlmInput formControlName="position" />
      </div>
    </div>

    <div class="space-y-1">
      <label class="text-sm font-medium text-slate-700" for="company">
        Company
      </label>
      <input id="company" hlmInput formControlName="company" />
    </div>

    <div class="space-y-1">
      <label class="text-sm font-medium text-slate-700" for="link">Link</label>
      <input id="link" hlmInput formControlName="link" placeholder="https://" />
    </div>

    <div class="space-y-1">
      <label class="text-sm font-medium text-slate-700" for="description">
        Description
      </label>
      <textarea
        id="description"
        hlmInput
        class="min-h-28"
        formControlName="description"
      ></textarea>
    </div>

    @if (submitError()) {
      <p class="text-sm text-red-600">{{ submitError() }}</p>
    }

    <div class="flex justify-end gap-2 pt-2">
      <button
        hlmBtn
        variant="outline"
        type="button"
        [disabled]="isSubmitting()"
        (click)="cancel()"
      >
        Cancel
      </button>
      <button hlmBtn type="submit" [disabled]="isSubmitting() || form.invalid">
        {{ isSubmitting() ? 'Creating...' : 'Create Job' }}
      </button>
    </div>
  </form>
</div>
