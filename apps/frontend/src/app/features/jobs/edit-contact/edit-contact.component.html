<div class="space-y-4">
  <header class="space-y-1">
    <h2 class="text-lg font-semibold text-slate-900">Edit Contact</h2>
    <p class="text-sm text-muted-foreground">Update the contact details.</p>
  </header>

  <form class="space-y-4" [formGroup]="form" (ngSubmit)="submit()">
    <div class="space-y-1">
      <label class="text-sm font-medium text-slate-700" for="edit-contact-name"
        >Name</label
      >
      <input id="edit-contact-name" hlmInput formControlName="name" />
    </div>

    <div class="space-y-1">
      <label class="text-sm font-medium text-slate-700" for="edit-contact-email"
        >Email</label
      >
      <input
        id="edit-contact-email"
        hlmInput
        type="email"
        formControlName="email"
      />
    </div>

    <div class="space-y-1">
      <label class="text-sm font-medium text-slate-700" for="edit-contact-phone"
        >Phone Number</label
      >
      <input id="edit-contact-phone" hlmInput formControlName="phoneNumber" />
    </div>

    @if (submitError()) {
      <p class="text-sm text-red-600">{{ submitError() }}</p>
    }

    <div class="flex justify-end gap-2 pt-2">
      <button
        hlmBtn
        variant="outline"
        type="button"
        [disabled]="isSubmitting()"
        (click)="cancel()"
      >
        Cancel
      </button>
      <button hlmBtn type="submit" [disabled]="isSubmitting() || form.invalid">
        {{ isSubmitting() ? 'Saving...' : 'Save Changes' }}
      </button>
    </div>
  </form>
</div>
