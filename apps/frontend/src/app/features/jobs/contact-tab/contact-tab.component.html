<div class="space-y-6">
  <div class="space-y-3">
    <div class="flex items-center justify-between gap-4">
      <h2 class="text-3xl font-semibold text-slate-900">Contacts</h2>
      <button hlmBtn variant="ghost" type="button" (click)="openCreateDialog()">
        <ng-icon hlm size="sm" name="lucidePlus" class="mr-2" />
        Add Contact
      </button>
    </div>
    <div class="h-px w-full max-w-2xl bg-slate-200"></div>
  </div>

  <app-contact-list
    [jobId]="jobId()"
    (edit)="openEditDialog($event)"
    (remove)="openDeleteDialog($event)"
  />
</div>
