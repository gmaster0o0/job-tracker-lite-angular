<div class="flex flex-col gap-4 p-6 bg-background border rounded-lg shadow-lg">
  <h2 class="text-lg font-semibold tracking-tight">Edit Job</h2>
  <p class="text-sm text-muted-foreground">
    Update the details for the job at {{ job.company }}.
  </p>

  <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4">
    <div class="space-y-1">
      <label hlmLabel for="company">Company</label>
      <input
        hlmInput
        id="company"
        formControlName="company"
        placeholder="e.g. Acme Inc"
        class="w-full"
      />
    </div>

    <div class="space-y-1">
      <label hlmLabel for="position">Position</label>
      <input
        hlmInput
        id="position"
        formControlName="position"
        placeholder="e.g. Frontend Engineer"
        class="w-full"
      />
    </div>

    <div class="space-y-1">
      <label hlmLabel for="link">Job Link</label>
      <input
        hlmInput
        id="link"
        formControlName="link"
        placeholder="https://..."
        class="w-full"
      />
    </div>

    <div class="space-y-1">
      <label hlmLabel for="description">Description</label>
      <textarea
        hlmInput
        id="description"
        formControlName="description"
        placeholder="A brief overview of the role"
        class="w-full"
        rows="3"
      ></textarea>
    </div>

    @if (submitError()) {
      <div class="text-sm font-medium text-destructive">
        {{ submitError() }}
      </div>
    }

    <div class="flex justify-end gap-2 pt-2">
      <button hlmBtn type="button" variant="outline" (click)="cancel()">
        Cancel
      </button>
      <button hlmBtn type="submit" [disabled]="form.invalid || isSubmitting()">
        {{ isSubmitting() ? 'Saving...' : 'Save Changes' }}
      </button>
    </div>
  </form>
</div>
