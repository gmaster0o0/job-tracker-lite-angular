<div hlmCard class="flex flex-row items-center justify-between p-6 shadow-sm">
  <div class="flex flex-col gap-3">
    <div class="flex items-center gap-3">
      <span class="text-base font-semibold text-slate-900">{{
        note().title
      }}</span>
    </div>
    <p class="text-sm text-slate-600">{{ note().body }}</p>
  </div>

  <div class="flex flex-col gap-1">
    <button
      hlmBtn
      variant="ghost"
      size="icon-sm"
      (click)="onEdit()"
      class="h-9 w-9 text-slate-400 hover:bg-slate-50 hover:text-blue-600"
    >
      <ng-icon hlm size="sm" name="lucidePencil" />
    </button>

    <button
      hlmBtn
      variant="ghost"
      size="icon-sm"
      (click)="onRemove()"
      class="h-9 w-9 text-slate-400 hover:bg-red-50 hover:text-red-600"
    >
      <ng-icon hlm size="sm" name="lucideTrash2" />
    </button>
  </div>
</div>
