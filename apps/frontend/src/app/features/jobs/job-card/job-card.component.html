@if (variant() === 'default') {
  <div
    hlmCard
    class="w-full border-slate-200 bg-white shadow-sm transition-all hover:shadow-md"
  >
    <div hlmCardHeader class="p-5 pb-3">
      <div class="flex items-start justify-between">
        <div class="space-y-1.5">
          <h3
            hlmCardTitle
            class="text-xl font-bold tracking-tight text-slate-900"
          >
            {{ job().position }}
          </h3>
          <p hlmCardDescription class="text-base font-medium text-slate-500">
            {{ job().company }}
          </p>
        </div>
        <span
          hlmBadge
          [ngClass]="statusBadgeClasses[job().status]"
          class="shrink-0 text-xs uppercase tracking-[0.02em]"
        >
          {{ job().status }}
        </span>
      </div>
    </div>

    <div
      hlmCardFooter
      class="flex items-center justify-between border-t border-slate-100 bg-slate-50/50 p-4 px-5"
    >
      <span
        class="text-xs font-semibold uppercase tracking-wider text-slate-400"
      >
        {{ job().createdAt | date: 'MM/dd/yyyy' }}
      </span>

      <span class="text-xs font-medium text-sky-600"> 1 contacts </span>
    </div>
  </div>
} @else {
  <div
    class="flex w-full cursor-pointer flex-col overflow-hidden rounded-xl border border-slate-200 bg-white p-3 shadow-sm transition-all hover:border-slate-400"
    [class.border-slate-800]="selected()"
    [class.shadow]="selected()"
  >
    <div class="flex items-start justify-between gap-2">
      <p class="truncate text-sm font-semibold text-slate-800">
        {{ job().position }}
      </p>
      <span
        hlmBadge
        [ngClass]="statusBadgeClasses[job().status]"
        class="shrink-0 text-[10px] uppercase tracking-[0.02em]"
      >
        {{ job().status }}
      </span>
    </div>

    <p class="mt-1 truncate text-xs text-slate-500">
      {{ job().company }}
    </p>

    <div class="mt-4 flex items-center justify-between">
      <span class="text-[10px] text-slate-400">
        {{ job().createdAt | date: 'MM/dd/yyyy' }}
      </span>
    </div>
  </div>
}
