<h1>{{ title }}</h1>

@if (user.value(); as userData) {
<section class="user-card">
  <h2>User profile</h2>
  <p><strong>ID:</strong> {{ userData.id }}</p>
  <p><strong>Name:</strong> {{ userData.name }}</p>
  <p><strong>Email:</strong> {{ userData.email }}</p>
  <pre>{{ userData | json }}</pre>
</section>
} @else {
<p>Loading user data…</p>
}
