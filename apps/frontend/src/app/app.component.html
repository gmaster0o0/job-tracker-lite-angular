@if (isStatusRoute()) {
  <router-outlet />
} @else {
  <main
    class="min-h-screen bg-slate-50 text-slate-950 px-4 py-8 sm:px-6 lg:px-8"
  >
    <div class="mx-auto max-w-6xl">
      <header
        class="mb-12 rounded-3xl bg-white/90 p-8 shadow-xl shadow-slate-200/80 ring-1 ring-slate-200"
      >
        <p
          class="text-sm font-semibold uppercase tracking-[0.3em] text-teal-700"
        >
          Job Tracker
        </p>
        <h1
          class="mt-4 text-4xl font-semibold tracking-tight text-slate-950 sm:text-5xl"
        >
          Saved opportunities
        </h1>
        <p class="mt-4 max-w-2xl text-base leading-7 text-slate-600">
          Track positions you want to revisit, apply to, and move through the
          hiring pipeline.
        </p>
      </header>

      @if (jobs.value(); as jobsData) {
        <app-job-list [jobs]="jobsData" />
      } @else {
        <section
          class="rounded-3xl bg-white/90 p-8 text-center shadow-xl shadow-slate-200/80 ring-1 ring-slate-200"
        >
          <p class="text-base font-medium text-slate-700">Loading jobs…</p>
        </section>
      }
    </div>
  </main>
}
