<div class="min-h-screen bg-slate-50 px-4 py-8 sm:px-6 lg:px-8">
  <div class="mx-auto max-w-4xl">
    <section
      class="rounded-3xl bg-white/90 p-8 shadow-xl shadow-slate-200/80 ring-1 ring-slate-200"
    >
      <header class="mb-6">
        <p
          class="text-sm font-semibold uppercase tracking-[0.3em] text-teal-700"
        >
          Health Check
        </p>
        <h1 class="mt-4 text-3xl font-semibold text-slate-950">
          Backend health status
        </h1>
      </header>

      @if (health.value(); as healthData) {
        <div class="grid gap-6 sm:grid-cols-2">
          <div class="rounded-3xl bg-slate-50 p-6 ring-1 ring-slate-200">
            <p
              class="text-sm font-semibold uppercase tracking-[0.2em] text-slate-500"
            >
              API
            </p>
            <p class="mt-3 text-3xl font-semibold text-slate-900">
              {{ healthData.status }}
            </p>
          </div>
          <div class="rounded-3xl bg-slate-50 p-6 ring-1 ring-slate-200">
            <p
              class="text-sm font-semibold uppercase tracking-[0.2em] text-slate-500"
            >
              Database
            </p>
            <p class="mt-3 text-3xl font-semibold text-slate-900">
              {{ healthData.database }}
            </p>
          </div>
        </div>
        <div class="mt-8 rounded-3xl bg-slate-50 p-6 ring-1 ring-slate-200">
          <p
            class="text-sm font-semibold uppercase tracking-[0.2em] text-slate-500"
          >
            Last checked
          </p>
          <p class="mt-3 text-slate-700">
            {{ healthData.timestamp | date: 'medium' }}
          </p>
        </div>
      } @else {
        <div
          class="rounded-3xl bg-slate-50 p-8 text-center text-slate-700 ring-1 ring-slate-200"
        >
          Loading health check…
        </div>
      }
    </section>
  </div>
</div>
