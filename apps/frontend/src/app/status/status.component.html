<div class="px-4 py-8 sm:px-6 lg:px-8">
  <hlm-card size="sm" class="mx-auto w-full max-w-sm">
    <hlm-card-header class="mb-6">
      <h1 hlmCardTitle>Health Check</h1>
    </hlm-card-header>
    <div hlmCardContent>
      @if (health.value(); as healthData) {
        <div class="grid gap-6 sm:grid-cols-2">
          <hlm-card>
            <hlm-card-header>
              <h3 hlmCardTitle>API</h3>
            </hlm-card-header>
            <div hlmCardContent>
              <span
                hlmBadge
                class="text-white"
                [class.bg-green-500]="healthData.status === 'UP'"
                [class.bg-red-500]="healthData.status === 'DOWN'"
              >
                {{ healthData.status }}
              </span>
            </div>
          </hlm-card>
          <hlm-card>
            <hlm-card-header>
              <h3 hlmCardTitle>Database</h3>
            </hlm-card-header>
            <div hlmCardContent>
              <span
                hlmBadge
                class="text-white"
                [class.bg-green-500]="healthData.database === 'UP'"
                [class.bg-red-500]="healthData.database === 'DOWN'"
              >
                {{ healthData.database }}
              </span>
            </div>
          </hlm-card>
        </div>

        <hlm-card class="mt-6">
          <hlm-card-header>
            <h3 hlmCardTitle>Last checked</h3>
          </hlm-card-header>
          <div hlmCardContent>
            <p hlmCardDescription>
              {{ healthData.timestamp | date: 'medium' }}
            </p>
          </div>
        </hlm-card>
      } @else {
        <div>
          <hlm-spinner></hlm-spinner>
          <p>Loading health check…</p>
        </div>
      }
    </div>
  </hlm-card>
</div>
