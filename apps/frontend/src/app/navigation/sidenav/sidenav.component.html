<div hlmSidebarWrapper class="w-full border-r h-full flex flex-col bg-card">
  <hlm-sidebar>
    <div hlmSidebarHeader class="p-4 space-y-4">
      <div class="flex items-center justify-between gap-2">
        <h1 class="text-xl font-bold tracking-tight">Job Tracker Lite</h1>
        <a
          hlmBtn
          variant="ghost"
          size="sm"
          routerLink="/"
          class="!p-2 text-muted-foreground hover:bg-background/80"
          aria-label="Back"
        >
          <ng-icon name="lucideArrowLeft" />
        </a>
      </div>
    </div>
    <div class="flex flex-col gap-2"></div>

    <div hlmSidebarContent>
      <ng-content></ng-content>
    </div>
    <div hlmSidebarFooter class="p-4 border-t bg-muted/30 shrink-0">
      <div class="flex flex-wrap items-center gap-2 md:flex-row">
        <button
          hlmBtn
          variant="outline"
          size="sm"
          class="w-full gap-2 bg-background justify-center text-muted-foreground hover:bg-background/80"
        >
          <ng-icon name="lucideLogOut" />
          Logout
        </button>
      </div>
    </div>
  </hlm-sidebar>
</div>
