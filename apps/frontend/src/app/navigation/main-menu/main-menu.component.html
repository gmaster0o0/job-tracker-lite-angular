<div class="space-y-3">
  <div class="px-2"></div>

  <nav class="space-y-2">
    @for (item of items; track item.path) {
      <a
        class="block rounded-lg px-3 py-3 transition hover:bg-slate-100"
        routerLinkActive="bg-slate-100"
        [routerLink]="item.path"
        [routerLinkActiveOptions]="{ exact: true }"
      >
        <span class="flex min-w-0 flex-col gap-1">
          <span class="truncate font-semibold text-slate-950">
            {{ item.label }}
          </span>
          <span class="text-xs leading-5 text-slate-500">
            {{ item.description }}
          </span>
        </span>
      </a>
    }
  </nav>
</div>
