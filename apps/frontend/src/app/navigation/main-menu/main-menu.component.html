<div class="space-y-4 p-3">
  <div class="px-2 text-sm uppercase tracking-[0.24em] text-slate-500">
    Navigation
  </div>

  <ul hlmSidebarMenu class="space-y-1">
    @for (item of items; track item.path) {
      <li hlmSidebarMenuItem>
        <a
          hlmSidebarMenuButton
          [routerLink]="item.path"
          routerLinkActive="active"
          class="w-full gap-3"
        >
          <ng-icon hlm size="sm" [name]="item.icon"></ng-icon>
          <span class="truncate">{{ item.label }}</span>
        </a>
      </li>
    }
  </ul>
</div>
