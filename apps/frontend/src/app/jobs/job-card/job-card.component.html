<spartan-ui-helm-card>
  <div class="flex flex-col gap-5">
    <div class="flex items-start justify-between gap-4">
      <div>
        <p
          class="text-xs font-semibold uppercase tracking-[0.24em] text-slate-500"
        >
          {{ job().company }}
        </p>
        <h2 class="mt-2 text-lg font-semibold tracking-tight text-slate-950">
          {{ job().position }}
        </h2>
      </div>
      <span [class]="statusClasses[job().status]">
        {{ job().status }}
      </span>
    </div>

    <div
      class="flex flex-wrap items-center justify-between gap-3 border-t border-slate-200/80 pt-4 text-sm text-slate-500"
    >
      <div class="flex items-center gap-2">
        <span
          class="rounded-full border border-slate-200/90 bg-slate-100 px-3 py-1 text-xs uppercase tracking-[0.18em] text-slate-600"
        >
          1 contact
        </span>
      </div>
      <p class="text-xs uppercase tracking-[0.18em] text-slate-400">
        {{ job().createdAt | date: 'MMM d, yyyy' }}
      </p>
    </div>
  </div>
</spartan-ui-helm-card>
