<div
  hlmCard
  class="w-full border-slate-200 bg-white shadow-sm transition-all hover:shadow-md"
>
  <div hlmCardHeader class="p-5 pb-3">
    <div class="flex items-start justify-between">
      <div class="space-y-1.5">
        <h3
          hlmCardTitle
          class="text-xl font-bold tracking-tight text-slate-900"
        >
          {{ job().position }}
        </h3>
        <p hlmCardDescription class="text-base font-medium text-slate-500">
          {{ job().company }}
        </p>
      </div>
      <span [class]="statusClasses[job().status]">
        {{ job().status }}
      </span>
    </div>
  </div>

  <div
    hlmCardFooter
    class="flex items-center justify-between border-t border-slate-100 bg-slate-50/50 p-4 px-5"
  >
    <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider">
      {{ job().createdAt | date: 'MM/dd/yyyy' }}
    </span>

    <span
      class="rounded bg-slate-100 px-2 py-0.5 text-[10px] font-bold uppercase text-slate-600 ring-1 ring-slate-200/60"
    >
      1 contacts
    </span>
  </div>
</div>
