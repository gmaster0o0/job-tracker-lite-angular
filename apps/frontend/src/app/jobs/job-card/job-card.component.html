<article
  class="rounded-3xl bg-white/90 p-6 shadow-xl shadow-slate-200/80 ring-1 ring-slate-200"
>
  <div
    class="flex flex-col gap-5 sm:flex-row sm:items-start sm:justify-between"
  >
    <div>
      <p class="text-sm font-semibold uppercase tracking-[0.2em] text-teal-700">
        {{ job().company }}
      </p>
      <h2 class="mt-3 text-xl font-semibold text-slate-950">
        {{ job().position }}
      </h2>
    </div>
    <span
      class="rounded-full px-4 py-2 text-sm font-semibold uppercase tracking-[0.18em] text-white bg-slate-800"
    >
      {{ job().status }}
    </span>
  </div>
</article>
